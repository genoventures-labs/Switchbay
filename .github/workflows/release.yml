name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install system dependencies (ripgrep)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run tests
        run: bun test

      - name: Bump version and release
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Read current version from package.json
          CURRENT_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "Current version: $CURRENT_VERSION"
          
          # Increment patch version
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          echo "New version: $NEW_VERSION"
          
          if [ -n "$TAP_GITHUB_TOKEN" ]; then
            # Make sure release.sh uses the GITHUB_TOKEN or TAP_GITHUB_TOKEN for authenticated clone/push
            # We configure git to use the token for GitHub requests
            git config --global url."https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
            
            chmod +x ./scripts/release.sh
            ./scripts/release.sh "$NEW_VERSION"
          else
            echo "TAP_GITHUB_TOKEN secret not set. Skipping brew formula update, but performing local version tag and release..."
            
            # Update files locally
            sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" package.json
            sed -i "s/switchbay [0-9]*\.[0-9]*\.[0-9]*/switchbay $NEW_VERSION/" src/cli/args.ts
            sed -i "s/version-[0-9]*\.[0-9]*\.[0-9]*/version-$NEW_VERSION/" README.md
            sed -i "s/version=\"[0-9]*\.[0-9]*\.[0-9]*\"/version=\"$NEW_VERSION\"/" src/tui/components/Transcript.tsx
            
            git add package.json src/cli/args.ts README.md src/tui/components/Transcript.tsx
            git commit -m "release: switchbay v$NEW_VERSION [skip ci]"
            git tag "v$NEW_VERSION"
            git push origin main
            git push origin "v$NEW_VERSION"
            
            # Create standard GitHub Release
            gh release create "v$NEW_VERSION" --title "v$NEW_VERSION" --notes "Release v$NEW_VERSION"
          fi
