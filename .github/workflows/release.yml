name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN || vars.TAP_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Keep releases independent from GitHub's tags API. `latest` makes
          # setup-bun query /repos/oven-sh/bun/git/refs/tags on every run.
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install system dependencies (ripgrep)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run tests
        run: bun test

      - name: Bump version and release
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN || vars.TAP_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Read current version from package.json
          CURRENT_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "Current version: $CURRENT_VERSION"
          
          # Increment patch version
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          echo "New version: $NEW_VERSION"
          
          # Use TAP_GITHUB_TOKEN if set; otherwise fall back to GITHUB_TOKEN for push auth.
          # TAP_GITHUB_TOKEN must have write access to genoventures-labs/homebrew-tap.
          # Without it, the tap formula will NOT be updated and brew upgrade will stall.
          AUTH_TOKEN="${TAP_GITHUB_TOKEN:-$GITHUB_TOKEN}"
          git config --global url."https://x-access-token:${AUTH_TOKEN}@github.com/".insteadOf "https://github.com/"

          chmod +x ./scripts/release.sh
          ./scripts/release.sh "$NEW_VERSION" || {
            echo "::warning::release.sh failed (tap push likely needs TAP_GITHUB_TOKEN with write access to homebrew-tap)"
            exit 1
          }
